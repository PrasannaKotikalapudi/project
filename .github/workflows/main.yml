name: Deploy Static Website to S3

on:
  push:
    branches:
      - main  # Change this to 'master' if your default branch is master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }} # Crucial for AWS Academy Labs
        aws-region: us-east-1 # Change if your S3 bucket is in a different region

    - name: Deploy files to S3 bucket
      run: |
        aws s3 sync . s3://team-portfolio-project --delete --exclude ".git/*" --exclude ".github/*"
